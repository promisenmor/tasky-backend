services:
  web:
    build: .
    container_name: tasky-web
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
      - redis

  db:
    image: postgres:17
    container_name: tasky_db
    environment:
      POSTGRES_DB: tasky
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data/

  redis:
    image: redis:7

    container_name: tasky_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
